<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- spherical body: highlight upper-left, warm shadow lower-right -->
    <radialGradient id="sphere" cx="38%" cy="32%" r="76%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="62%" stop-color="#ffffff"/>
      <stop offset="87%" stop-color="#f4efe4"/>
      <stop offset="100%" stop-color="#e8e1d2"/>
    </radialGradient>
    <!-- concave dimple: soft navy pit fading to nothing -->
    <radialGradient id="pit" cx="50%" cy="44%" r="55%">
      <stop offset="0%" stop-color="#0C2340" stop-opacity="0.15"/>
      <stop offset="62%" stop-color="#0C2340" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0C2340" stop-opacity="0"/>
    </radialGradient>
    <!-- rim vignette: darkens edge so dimples foreshorten into shadow -->
    <radialGradient id="vig" cx="50%" cy="50%" r="50%">
      <stop offset="76%" stop-color="#0C2340" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0C2340" stop-opacity="0.13"/>
    </radialGradient>
    <!-- hex-packed dimple field -->
    <pattern id="dimples" width="13" height="11" patternUnits="userSpaceOnUse">
      <circle cx="3.25" cy="2.75" r="2.8" fill="url(#pit)"/>
      <circle cx="9.75" cy="2.75" r="2.8" fill="url(#pit)"/>
      <circle cx="0"    cy="8.25" r="2.8" fill="url(#pit)"/>
      <circle cx="6.5"  cy="8.25" r="2.8" fill="url(#pit)"/>
      <circle cx="13"   cy="8.25" r="2.8" fill="url(#pit)"/>
    </pattern>
    <clipPath id="ball"><circle cx="50" cy="50" r="49"/></clipPath>
  </defs>

  <circle cx="50" cy="50" r="49" fill="url(#sphere)"/>
  <g clip-path="url(#ball)"><rect width="100" height="100" fill="url(#dimples)"/></g>
  <circle cx="50" cy="50" r="49" fill="url(#vig)"/>

  <!-- specular highlight -->
  <ellipse cx="35" cy="27" rx="17" ry="12" fill="#ffffff" opacity="0.5"/>
  <ellipse cx="32" cy="24" rx="7"  ry="5"  fill="#ffffff" opacity="0.7"/>

  <!-- crisp rim -->
  <circle cx="50" cy="50" r="48.5" fill="none" stroke="#0C2340" stroke-opacity="0.16" stroke-width="1"/>
</svg>
